<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>3D 包装盒查看器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0e17;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;color:#c9d1d9;}
canvas{display:block;}
#info{position:fixed;top:12px;left:12px;z-index:10;background:rgba(13,17,23,.92);border:1px solid #21262d;
  border-radius:10px;padding:10px 16px;font-size:12px;line-height:1.6;pointer-events:none;}
#info span{color:#58a6ff;}
#loadStatus{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;
  background:rgba(0,0,0,.85);border:1px solid #30363d;border-radius:10px;padding:24px 36px;
  font-size:16px;color:#f0f6fc;}
#panelToggle{position:fixed;top:12px;right:12px;z-index:101;width:36px;height:36px;border-radius:8px;
  border:1px solid #30363d;background:rgba(13,17,23,.9);color:#8b949e;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;}
#panelToggle:hover{background:#161b22;color:#f0f6fc;border-color:#58a6ff;}
#panel{position:fixed;top:0;right:0;width:300px;height:100vh;background:rgba(13,17,23,.97);
  border-left:1px solid #1a2332;color:#c9d1d9;font-size:13px;overflow-y:auto;z-index:100;
  transition:transform .3s ease;scrollbar-width:thin;scrollbar-color:#161b22 #0d1117;}
#panel.hidden{transform:translateX(100%);}
#panel .ph{padding:16px 18px;font-size:15px;font-weight:700;color:#f0f6fc;
  border-bottom:1px solid #21262d;display:flex;align-items:center;gap:8px;}
#panel .ph svg{width:20px;height:20px;fill:none;stroke:#58a6ff;stroke-width:2;}
.pg{padding:14px 16px;border-bottom:1px solid #161b22;}
.pg-title{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;margin-bottom:10px;font-weight:600;}
select,input[type=range]{width:100%;background:#0d1117;color:#c9d1d9;border:1px solid #21262d;
  border-radius:6px;padding:6px 8px;font-size:12px;}
input[type=range]{padding:0;accent-color:#58a6ff;}
label{font-size:11px;color:#8b949e;}
.dpad{display:grid;grid-template-columns:48px 48px 48px;grid-template-rows:36px 36px 36px;gap:4px;justify-content:center;}
.dpad button{width:48px;height:36px;border-radius:6px;border:1px solid #30363d;background:#161b22;color:#c9d1d9;
  font-size:16px;cursor:pointer;transition:all .15s;}
.dpad button:hover{background:#1c2333;color:#f0f6fc;border-color:#58a6ff;}
.dpad .empty{visibility:hidden;}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;}
.btn-row button,.btn-row select{flex:1;min-width:0;padding:7px 8px;border-radius:6px;border:1px solid #30363d;
  background:#161b22;color:#c9d1d9;font-size:12px;cursor:pointer;transition:all .15s;}
.btn-row button:hover,.btn-row select:hover{background:#1c2333;color:#f0f6fc;border-color:#58a6ff;}
.exp-btn{width:100%;margin-top:8px;padding:9px 0;border-radius:6px;border:1px solid #238636;background:#161b22;
  color:#3fb950;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.exp-btn:hover{background:#1c2333;}
.color-row{display:flex;gap:6px;align-items:center;}
.color-row input[type=color]{width:36px;height:28px;border:1px solid #30363d;border-radius:4px;background:none;padding:0;cursor:pointer;}
#progress{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:20;
  background:rgba(0,0,0,.85);border:1px solid #30363d;border-radius:8px;padding:8px 18px;font-size:12px;color:#8b949e;}
</style>
</head>
<body>

<div id="info">📦 产品：<span id="st">—</span></div>
<div id="loadStatus">正在加载图片…</div>
<button id="panelToggle" title="显示/隐藏面板">☰</button>
<div id="panel">
  <div class="ph">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    3D 包装盒查看器
  </div>

  <div class="pg">
    <div class="pg-title">选择包装盒</div>
    <select id="selBox" onchange="switchBox(this.value)"></select>
  </div>

  <div class="pg">
    <div class="pg-title">D-Pad 旋转</div>
    <div class="dpad">
      <div class="empty"></div>
      <button title="上" onclick="dPad('up')">▲</button>
      <div class="empty"></div>
      <button title="左" onclick="dPad('left')">◀</button>
      <button title="重置" onclick="dPad('reset')">↺</button>
      <button title="右" onclick="dPad('right')">▶</button>
      <div class="empty"></div>
      <button title="下" onclick="dPad('down')">▼</button>
      <div class="empty"></div>
    </div>
    <div style="margin-top:8px;text-align:center;">
      <select id="stepSel" style="width:80px;padding:4px 6px;border-radius:6px;border:1px solid #30363d;
        background:#0d1117;color:#c9d1d9;font-size:12px;">
        <option value="5">5°</option>
        <option value="15">15°</option>
        <option value="30" selected>30°</option>
        <option value="45">45°</option>
        <option value="90">90°</option>
      </select>
      <span style="font-size:11px;color:#8b949e;margin-left:4px;">步进角度</span>
    </div>
  </div>

  <div class="pg">
    <div class="pg-title">自动旋转</div>
    <div class="btn-row">
      <button onclick="setAuto('none')" id="autoNone">关</button>
      <button onclick="setAuto('slow')" id="autoSlow">慢</button>
      <button onclick="setAuto('normal')" id="autoNormal">中</button>
      <button onclick="setAuto('fast')" id="autoFast">快</button>
    </div>
  </div>

  <div class="pg">
    <div class="pg-title">视角预设</div>
    <div class="btn-row">
      <button onclick="viewPreset('front')">正面</button>
      <button onclick="viewPreset('back')">背面</button>
      <button onclick="viewPreset('left')">左侧</button>
    </div>
    <div class="btn-row" style="margin-top:4px;">
      <button onclick="viewPreset('right')">右侧</button>
      <button onclick="viewPreset('top')">顶面</button>
      <button onclick="viewPreset('bottom')">底面</button>
    </div>
    <div class="btn-row" style="margin-top:4px;">
      <button onclick="viewPreset('iso')" style="flex:1;">等轴测</button>
    </div>
  </div>

  <div class="pg">
    <div class="pg-title">视角调节</div>
    <label>视野角度（FOV）：<span id="fovVal">30</span></label>
    <input type="range" id="fovSlider" min="10" max="120" value="30"
      oninput="document.getElementById('fovVal').textContent=this.value;applyFov(this.value)">
  </div>

  <div class="pg">
    <div class="pg-title">图像调整</div>
    <label>亮度：<span id="bv">2</span></label>
    <input type="range" id="brightness" min="-100" max="100" value="2"
      oninput="document.getElementById('bv').textContent=this.value;applyAdjust()">
    <label style="margin-top:8px;display:block;">对比度：<span id="cv">2</span></label>
    <input type="range" id="contrast" min="-100" max="100" value="2"
      oninput="document.getElementById('cv').textContent=this.value;applyAdjust()">
    <label style="margin-top:8px;display:block;">饱和度：<span id="sv">120</span></label>
    <input type="range" id="saturate" min="0" max="300" value="120"
      oninput="document.getElementById('sv').textContent=this.value;applyAdjust()">
  </div>

  <div class="pg">
    <div class="pg-title">边线调整</div>
    <div class="color-row">
      <label style="font-size:11px;color:#8b949e;">颜色</label>
      <input type="color" id="edgeColor" value="#ffffff" oninput="applyEdgeColor(this.value)">
    </div>
    <label style="margin-top:10px;display:block;">粗细：<span id="ev">1</span>px</label>
    <input type="range" id="edgeWidth" min="1" max="5" value="1"
      oninput="document.getElementById('ev').textContent=this.value;applyEdgeWidth(this.value)">
    <label style="margin-top:10px;display:block;">透明度：<span id="eov">10</span>%</label>
    <input type="range" id="edgeOpacity" min="0" max="100" value="10"
      oninput="document.getElementById('eov').textContent=this.value;applyEdgeOpacity(this.value)">
  </div>

  <div class="pg">
    <div class="pg-title">显示</div>
    <div class="btn-row">
      <button onclick="toggleObj('edges')" id="btnEdges">边线</button>
      <button onclick="toggleObj('ground')" id="btnGround">地面</button>
      <button onclick="toggleObj('grid')" id="btnGrid">网格</button>
    </div>
    <div class="btn-row" style="margin-top:4px;">
      <button onclick="toggleObj('wireframe')" id="btnWire">线框</button>
      <button onclick="toggleObj('box')" id="btnBox">盒子</button>
    </div>
    <div class="color-row" style="margin-top:10px;">
      <label style="font-size:11px;color:#8b949e;">背景色</label>
      <input type="color" id="bgColor" value="#0a0e17" oninput="setBg(this.value)">
    </div>
  </div>

  <div class="pg">
    <div class="pg-title">导出 PNG</div>
    <div class="btn-row">
      <button onclick="exportImg(512)">512</button>
      <button onclick="exportImg(1024)">1K</button>
      <button onclick="exportImg(2048)">2K</button>
      <button onclick="exportImg(4096)">4K</button>
      <button onclick="exportImg(8192)">8K</button>
    </div>
    <button class="exp-btn" onclick="exportImg(0)">📸 导出当前尺寸</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ── 产品列表（由 Python 注入）─────────────────────────────────────
const PRODUCTS = {
    "panels":"panels/",
    "水族灯-合金款_SR-659":"boxes/水族灯-合金款_SR-659/",
    "水族灯-合金款-SR-618":"boxes/水族灯-合金款-SR-618/",
    "水族灯合金款_SR-628":"boxes/水族灯合金款_SR-628/",
    "水族灯合金款_SR-657":"boxes/水族灯合金款_SR-657/",
    "水族灯_SR-616":"boxes/水族灯_SR-616/",
    "水族灯_SR-620":"boxes/水族灯_SR-620/",
    "水族灯_SR-653":"boxes/水族灯_SR-653/",
    "水族灯_SR-666":"boxes/水族灯_SR-666/",
    "水族灯-潜水款_SR-619":"boxes/水族灯-潜水款_SR-619/",
    "水族灯-潜水款_SR-629":"boxes/水族灯-潜水款_SR-629/",
    "水族灯支架款_SR-617":"boxes/水族灯支架款_SR-617/",
    "海水灯_SR-691":"boxes/海水灯_SR-691/",
    "爬虫灯-SR-013":"boxes/爬虫灯-SR-013/",
    "过滤泵UV_SR-706":"boxes/过滤泵UV_SR-706/",
    "过滤泵_SR-701-702-703":"boxes/过滤泵_SR-701-702-703/",
    "过滤泵_SR-702A":"boxes/过滤泵_SR-702A/",
    "加热棒-SR-327_旋钮":"boxes/加热棒-SR-327_旋钮/",
    "加热棒_SR-308":"boxes/加热棒_SR-308/",
    "加热棒_SR-317":"boxes/加热棒_SR-317/",
    "加热棒_SR-318_迷你":"boxes/加热棒_SR-318_迷你/",
    "气泵-数显款_SR-206":"boxes/气泵-数显款_SR-206/",
    "气泵-透明款_SR-201-2-4":"boxes/气泵-透明款_SR-201-2-4/",
    "温度感应-潜水款_SR-802":"boxes/温度感应-潜水款_SR-802/",
    "温度感应数显款_SR-801":"boxes/温度感应数显款_SR-801/",
    "刮藻器_SR-513":"boxes/刮藻器_SR-513/",
    "刮藻器_SR-517":"boxes/刮藻器_SR-517/",
    "磁吸刷_SR-510":"boxes/磁吸刷_SR-510/",
    "洗沙器-迷你_SR-527":"boxes/洗沙器-迷你_SR-527/",
    "洗沙器_SR-528":"boxes/洗沙器_SR-528/",
    "洗沙器_SR-529":"boxes/洗沙器_SR-529/",
    "试纸_SR-901-902":"boxes/试纸_SR-901-902/"
};
const FACES = ['front','back','left','right','top','bottom'];
let currentFolder = null;
let scene, camera, renderer, controls, boxGroup, boxH, boxD;
let edgesObj, groundObj, gridObj, boxMesh;
let autoRotate = 'none', autoSpeed = 0;
let brightnessVal=2, contrastVal=2, saturateVal=120;
let texCache = {};
const imgs = {};

// ── 初始化 ────────────────────────────────────────────────────────
init();
function init(){
  renderer = new THREE.WebGLRenderer({antialias:true, preserveDrawingBuffer:true});
  renderer.setPixelRatio(window.devicePixelRatio||1);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x0a0e17);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0e17);

  camera = new THREE.PerspectiveCamera(30, window.innerWidth/window.innerHeight, 0.01, 1000);
  camera.position.set(5, 3.5, 7);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 1;
  controls.maxDistance = 50;

  // 灯光
  var amb = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(amb);
  var dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(5, 10, 7);
  scene.add(dir);

  // 地面
  var gGeo = new THREE.PlaneGeometry(40, 40);
  var gMat = new THREE.MeshBasicMaterial({color:0x161b22, transparent:true, opacity:0.8});
  groundObj = new THREE.Mesh(gGeo, gMat);
  groundObj.rotation.x = -Math.PI/2;
  groundObj.receiveShadow = true;
  scene.add(groundObj);

  // 网格
  var grid = new THREE.GridHelper(40, 40, 0x21262d, 0x161b22);
  grid.position.y = 0.01;
  gridObj = grid;
  scene.add(grid);

  // 盒子组
  boxGroup = new THREE.Group();
  scene.add(boxGroup);

  // UI
  document.getElementById('panelToggle').onclick = function(){
    document.getElementById('panel').classList.toggle('hidden');
  };
  window.addEventListener('resize', onResize);

  // 默认加载第一个产品
  var keys = Object.keys(PRODUCTS);
  if(keys.length > 0){
    var sel = document.getElementById('selBox');
    keys.forEach(function(k){ var o=document.createElement('option'); o.value=k; o.textContent=k; sel.appendChild(o); });
    switchBox(keys[0]);
  }

  animate();
}

function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ── 加载产品 ───────────────────────────────────────────────────────
function switchBox(name){
  var folder = PRODUCTS[name];
  if(!folder){ console.error('产品未找到: '+name); return; }
  currentFolder = folder;
  document.getElementById('st').textContent = name;
  document.getElementById('loadStatus').style.display = 'block';
  document.getElementById('loadStatus').textContent = '正在加载图片…';

  var pending = 6;
  FACES.forEach(function(face){
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function(){
      imgs[face] = img;
      pending--;
      if(pending <= 0) buildBox();
    };
    img.onerror = function(){
      console.error('加载失败: '+face);
      imgs[face] = null;  // 清除旧贴图，避免显示之前产品的图片
      pending--;
      if(pending <= 0) buildBox();
    };
    img.src = folder + face + '.png?' + Date.now();
  });
}

// ── 构建盒子 ───────────────────────────────────────────────────────
function buildBox(){
  // 清除旧的
  while(boxGroup.children.length > 0){
    var c = boxGroup.children[0];
    if(c.geometry) c.geometry.dispose();
    if(c.material){
      if(Array.isArray(c.material)){
        c.material.forEach(function(m){ if(m.map) m.map.dispose(); m.dispose(); });
      } else {
        if(c.material.map) c.material.map.dispose();
        c.material.dispose();
      }
    }
    boxGroup.remove(c);
  }
  texCache = {};

  // 根据图片像素尺寸推算盒子比例
  var fw = imgs.front ? imgs.front.naturalWidth : 1000;
  var fh = imgs.front ? imgs.front.naturalHeight : 1000;
  var lw = imgs.left ? imgs.left.naturalWidth : 400;
  var th = imgs.top ? imgs.top.naturalHeight : 400;

  var W = 4.0;
  var H = fw > 0 ? W * fh / fw : 3.0;
  var D = lw > 0 ? W * lw / fw : 1.5;

  var geo = new THREE.BoxGeometry(W, H, D);
  var mats = [];
  var faceOrder = ['right','left','top','bottom','front','back'];
  faceOrder.forEach(function(face){
    var tex = makeTex(imgs[face]);
    texCache[face] = tex;
    mats.push(new THREE.MeshBasicMaterial({map:tex, side:THREE.FrontSide}));
  });
  boxMesh = new THREE.Mesh(geo, mats);
  boxGroup.add(boxMesh);

  var ec=document.getElementById('edgeColor').value;
  var eo=parseInt(document.getElementById('edgeOpacity').value)/100;
  var edgeMat = new THREE.LineBasicMaterial({color:new THREE.Color(ec), transparent:true, opacity:eo});
  var edgeGeo = new THREE.EdgesGeometry(geo, 15*Math.PI/180);
  edgesObj = new THREE.LineSegments(edgeGeo, edgeMat);
  boxGroup.add(edgesObj);

  // 底面贴地
  boxGroup.position.y = H / 2;
  boxH = H;
  boxD = D;
  groundObj.position.y = 0;
  gridObj.position.y = 0.01;

  document.getElementById('loadStatus').style.display = 'none';
}

// ── 纹理（含图像调整）────────────────────────────────────────────
function makeTex(img){
  if(!img) {
    // 返回黑色纹理
    var cv = document.createElement('canvas');
    cv.width = cv.height = 2;
    var ctx = cv.getContext('2d');
    ctx.fillStyle = '#000000';
    ctx.fillRect(0,0,2,2);
    var t = new THREE.CanvasTexture(cv);
    t.needsUpdate = true;
    return t;
  }
  var cv = document.createElement('canvas');
  cv.width = img.naturalWidth || img.width;
  cv.height = img.naturalHeight || img.height;
  var ctx = cv.getContext('2d');
  ctx.filter = 'brightness('+(100+brightnessVal)+'%) contrast('+(100+contrastVal)+'%) saturate('+saturateVal+'%)';
  ctx.drawImage(img, 0, 0);
  var t = new THREE.CanvasTexture(cv);
  t.needsUpdate = true;
  return t;
}

function applyAdjust(){
  brightnessVal = parseInt(document.getElementById('brightness').value)||0;
  contrastVal  = parseInt(document.getElementById('contrast').value)||0;
  saturateVal  = parseInt(document.getElementById('saturate').value)||100;
  FACES.forEach(function(face){
    // face order: right=0, left=1, top=2, bottom=3, front=4, back=5
    var mat = boxMesh ? boxMesh.material[face==='right'?0:face==='left'?1:face==='top'?2:face==='bottom'?3:face==='front'?4:5] : null;
    if(mat && texCache[face]){
      var cv = texCache[face].image;
      var ctx = cv.getContext('2d');
      ctx.filter = 'brightness('+(100+brightnessVal)+'%) contrast('+(100+contrastVal)+'%) saturate('+saturateVal+'%)';
      ctx.clearRect(0,0,cv.width,cv.height);
      ctx.drawImage(imgs[face], 0, 0);
      texCache[face].needsUpdate = true;
    }
  });
}

// ── D-Pad 旋转 ────────────────────────────────────────────────────
let dPadTimeout = null, dPadAccel = 0;
function dPad(dir){
  if(dir==='reset'){ boxGroup.rotation.set(0,0,0); dPadAccel=0; controls.reset(); return; }
  var step = parseInt(document.getElementById('stepSel').value)||30;
  dPadAccel = Math.min(dPadAccel+1, 5);
  var mult = 1 + dPadAccel * 0.5;
  var angle = step * mult * Math.PI / 180;
  if(dir==='up')    boxGroup.rotation.x -= angle;
  if(dir==='down')  boxGroup.rotation.x += angle;
  if(dir==='left')  boxGroup.rotation.y += angle;
  if(dir==='right') boxGroup.rotation.y -= angle;
  clearTimeout(dPadTimeout);
  dPadTimeout = setTimeout(function(){ dPadAccel=0; },400);
}

// ── 自动旋转 ──────────────────────────────────────────────────────
function setAuto(mode){
  autoRotate = mode;
  if(mode==='none')   { controls.autoRotate=false; autoSpeed=0; }
  if(mode==='slow')   { controls.autoRotate=true; controls.autoRotateSpeed=0.6; }
  if(mode==='normal') { controls.autoRotate=true; controls.autoRotateSpeed=1.5; }
  if(mode==='fast')   { controls.autoRotate=true; controls.autoRotateSpeed=4.0; }
}

// ── 视角预设 ──────────────────────────────────────────────────────
function viewPreset(preset){
  var H = boxH || 3.7329, D = (boxGroup.children[0]&&boxGroup.children[0].children[0]&&boxGroup.children[0].children[0].geometry) ? boxGroup.children[0].children[0].geometry.parameters.depth : 1.5;
  switch(preset){
    case 'front':  camera.position.set(5, 3.5, 7);  break;
    case 'back':   camera.position.set(0, H/2, -8); break;
    case 'left':   camera.position.set(-8, H/2, 0); break;
    case 'right':  camera.position.set(8, H/2, 0);  break;
    case 'top':    camera.position.set(0, 8, 0.01); break;
    case 'bottom': camera.position.set(0, -8, 0.01);break;
    case 'iso':    camera.position.set(6, 5, 6);     break;
  }
  controls.target.set(0, H/2, 0);
  controls.update();
}

// ── 显示切换 ──────────────────────────────────────────────────────
function toggleObj(obj){
  if(obj==='edges')    { edgesObj.visible   = !edgesObj.visible;   document.getElementById('btnEdges').style.borderColor = edgesObj.visible?'#58a6ff':'#30363d'; }
  if(obj==='ground')   { groundObj.visible  = !groundObj.visible;  document.getElementById('btnGround').style.borderColor = groundObj.visible?'#58a6ff':'#30363d'; }
  if(obj==='grid')     { gridObj.visible    = !gridObj.visible;    document.getElementById('btnGrid').style.borderColor = gridObj.visible?'#58a6ff':'#30363d'; }
  if(obj==='wireframe'){
    boxMesh.material.forEach(function(m){ m.wireframe = !m.wireframe; });
    document.getElementById('btnWire').style.borderColor = boxMesh.material[0].wireframe?'#58a6ff':'#30363d';
  }
  if(obj==='box'){
    boxMesh.visible = !boxMesh.visible;
    document.getElementById('btnBox').style.borderColor = boxMesh.visible?'#58a6ff':'#30363d';
  }
}

// ── 背景色 ────────────────────────────────────────────────────────
function setBg(hex){
  var c = new THREE.Color(hex);
  scene.background = c;
  renderer.setClearColor(c);
}

// ── 导出 PNG ──────────────────────────────────────────────────────
function exportImg(size){
  var oldAuto = controls.autoRotate;
  controls.autoRotate = false;
  var label = 'box3d_' + (size||'current') + '.png';

  if(size > 0){
    // Use 2D canvas upscale to avoid WebGL buffer size limits
    var oldAspect = camera.aspect;
    camera.aspect = 1;
    camera.updateProjectionMatrix();

    // Temporarily resize renderer for high-quality render
    // Use device pixel ratio capped at 2x to stay within GPU limits
    var renderSize = Math.min(size, 2048);
    renderer.setSize(renderSize, renderSize);
    renderer.render(scene, camera);

    // Upscale to target size via 2D canvas
    var offscreen = document.createElement('canvas');
    offscreen.width = size;
    offscreen.height = size;
    var ctx = offscreen.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(renderer.domElement, 0, 0, size, size);

    // Restore renderer
    camera.aspect = oldAspect;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);

    offscreen.toBlob(function(blob){
      if(!blob){ alert('Export failed'); return; }
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = label;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
    }, 'image/png');
  } else {
    renderer.render(scene, camera);
    renderer.domElement.toBlob(function(blob){
      if(!blob){ alert('Export failed'); return; }
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = label;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 3000);
    }, 'image/png');
  }
  controls.autoRotate = oldAuto;
}

// ── 边线颜色/粗细 ────────────────────────────────────────────────
function applyFov(val){
  camera.fov = parseInt(val)||45;
  camera.updateProjectionMatrix();
}

function applyEdgeColor(hex){
  if(!edgesObj) return;
  var c = new THREE.Color(hex);
  edgesObj.material.color = c;
}

function applyEdgeWidth(val){
  if(!edgesObj) return;
  edgesObj.material.linewidth = parseInt(val);
}

function applyEdgeOpacity(val){
  if(!edgesObj) return;
  edgesObj.material.opacity = parseInt(val) / 100;
}

// ── 动画循环 ──────────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  // 动态调整盒子Y位置，使底面最低点始终贴地
  if(boxH && boxD){
    var cx = Math.cos(boxGroup.rotation.x);
    var sx = Math.abs(Math.sin(boxGroup.rotation.x));
    boxGroup.position.y = boxH/2 * cx + boxD/2 * sx;
  }
  controls.update();
  renderer.render(scene, camera);
}
</script>
